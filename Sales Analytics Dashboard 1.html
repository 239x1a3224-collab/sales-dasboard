<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Analytics Dashboard</title>
    <meta name="description" content="A modern sales analytics dashboard displaying key performance metrics and trends.">
    <link rel="stylesheet" href="./Sales Analytics Dashboard 1_files/style.css">
    <link href="./Sales Analytics Dashboard 1_files/css2" rel="stylesheet">

<body>
    <div class="dashboard-container">
        <header>
            <h1>Sales Analytics Dashboard</h1>
            <p>Real-time insights and performance metrics</p>
        </header>
        
        <main class="charts-grid">
            <div class="chart-card">
                <h2>Monthly Sales</h2>
                <div class="chart-wrapper">
                    <canvas id="monthlySalesChart" width="501" height="375" style="display: block; box-sizing: border-box; height: 300px; width: 401.1px;"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h2>Revenue Trends</h2>
                <div class="chart-wrapper">
                    <canvas id="revenueTrendsChart" width="501" height="375" style="display: block; box-sizing: border-box; height: 300px; width: 401.1px;"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h2>Product Categories</h2>
                <div class="chart-wrapper">
                    <canvas id="productCategoriesChart" width="501" height="375" style="display: block; box-sizing: border-box; height: 300px; width: 401.1px;"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h2>Regional Sales</h2>
                <div class="chart-wrapper">
                    <canvas id="regionalSalesChart" width="501" height="375" style="display: block; box-sizing: border-box; height: 300px; width: 401.1px;"></canvas>
                </div>
            </div>
            
            <div class="chart-card radar-card">
                <h2>Team Performance</h2>
                <div class="chart-wrapper">
                    <canvas id="teamPerformanceChart" width="501" height="375" style="display: block; box-sizing: border-box; height: 300px; width: 401.1px;"></canvas>
                </div>
            </div>
        </main>
    </div>
    <script src="./Sales Analytics Dashboard 1_files/script.js"></script>
